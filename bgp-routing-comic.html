<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络路由大冒险 - 漫画讲解</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#FFF8F0;--ink:#1A1A2E;--blue:#3B82F6;--orange:#F97316;
  --green:#22C55E;--red:#EF4444;--purple:#8B5CF6;--gray:#6B7280;
  --panel-bg:#fff;--shadow:0 4px 20px rgba(0,0,0,0.12);
}
body{
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--paper);color:var(--ink);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 80px;
}
h1.title{
  font-size:28px;font-weight:900;letter-spacing:2px;
  text-align:center;margin-bottom:4px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.06);
}
.subtitle{font-size:13px;color:var(--gray);text-align:center;margin-bottom:24px;letter-spacing:1px}

.comic-page{
  width:100%;max-width:520px;display:flex;flex-direction:column;gap:16px;
}

.panel{
  background:var(--panel-bg);border:3px solid var(--ink);border-radius:12px;
  padding:16px;position:relative;overflow:hidden;
  box-shadow:var(--shadow);opacity:0;transform:translateY(30px);
  transition:opacity 0.5s,transform 0.5s;
}
.panel.visible{opacity:1;transform:translateY(0)}
.panel.highlight{border-color:var(--orange);box-shadow:0 0 0 2px var(--orange),var(--shadow)}

.panel-number{
  position:absolute;top:-1px;left:12px;background:var(--ink);color:#fff;
  font-size:11px;font-weight:700;padding:2px 10px;border-radius:0 0 6px 6px;
  letter-spacing:1px;
}

.char-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.char-avatar{
  width:48px;height:48px;border-radius:50%;border:2px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  flex-shrink:0;
}
.char-avatar.hero{background:#DBEAFE}
.char-avatar.isp{background:#FEF3C7}
.char-avatar.hacker{background:#F3E8FF}
.char-avatar.packet{background:#DCFCE7}

.speech-bubble{
  background:#fff;border:2px solid var(--ink);border-radius:16px;
  padding:10px 14px;position:relative;font-size:14px;line-height:1.7;
  flex:1;
}
.speech-bubble::before{
  content:'';position:absolute;left:-10px;top:14px;
  border:6px solid transparent;border-right-color:var(--ink);
}
.speech-bubble::after{
  content:'';position:absolute;left:-7px;top:15px;
  border:5px solid transparent;border-right-color:#fff;
}

.thought-bubble{
  background:#fff;border:2px dashed var(--gray);border-radius:20px;
  padding:10px 16px;font-size:13px;line-height:1.7;color:var(--gray);
  font-style:italic;margin:8px 0 8px 60px;
}

.scene-svg{width:100%;margin:8px 0;border-radius:8px}

.label-tag{
  display:inline-block;padding:2px 8px;border-radius:4px;
  font-size:12px;font-weight:600;
}
.label-tag.blue{background:#DBEAFE;color:#1D4ED8}
.label-tag.orange{background:#FFF7ED;color:#C2410C}
.label-tag.green{background:#DCFCE7;color:#15803D}
.label-tag.red{background:#FEE2E2;color:#DC2626}
.label-tag.purple{background:#F3E8FF;color:#7C3AED}

.key-point{
  background:linear-gradient(135deg,#FEF3C7,#FDE68A);
  border:2px solid var(--orange);border-radius:10px;
  padding:12px 14px;margin:8px 0;font-size:13px;line-height:1.7;
}
.key-point i{color:var(--orange);margin-right:4px}

.comparison{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;
}
.comparison .col{
  border:2px solid;border-radius:8px;padding:10px;font-size:13px;line-height:1.6;
}
.comparison .col.can{border-color:var(--green);background:#F0FDF4}
.comparison .col.cant{border-color:var(--red);background:#FEF2F2}
.comparison .col h4{font-size:13px;margin-bottom:4px}

.nav-bar{
  position:fixed;bottom:0;left:0;right:0;background:rgba(255,248,240,0.95);
  backdrop-filter:blur(8px);border-top:2px solid var(--ink);
  padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:12px;
  z-index:100;
}
.nav-bar button{
  border:2px solid var(--ink);border-radius:8px;padding:6px 18px;
  font-size:14px;font-weight:600;cursor:pointer;
  background:#fff;transition:all 0.15s;
}
.nav-bar button:hover{background:var(--ink);color:#fff}
.nav-bar button:disabled{opacity:0.3;cursor:not-allowed;background:#fff;color:var(--ink)}
.nav-bar .page-info{font-size:13px;color:var(--gray);min-width:60px;text-align:center}

.sfx{
  font-size:24px;font-weight:900;letter-spacing:3px;
  color:var(--red);text-shadow:2px 2px 0 #FCA5A5;
  text-align:center;margin:4px 0;
}

.anim-float{animation:floaty 2s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.anim-dash{animation:dashMove 1.5s linear infinite}
@keyframes dashMove{to{stroke-dashoffset:-20}}

.step-indicator{
  display:flex;gap:4px;justify-content:center;margin-bottom:16px;
}
.step-dot{
  width:8px;height:8px;border-radius:50%;background:#D1D5DB;
  transition:background 0.3s;
}
.step-dot.active{background:var(--ink)}
.step-dot.done{background:var(--green)}

@media(prefers-reduced-motion:reduce){
  .panel{transition:opacity 0.2s;transform:none!important}
  .anim-float,.anim-dash{animation:none}
}
</style>
</head>

let currentPage = 0;

function renderDots() {
  const ind = document.getElementById('stepIndicator');
  ind.innerHTML = pages.map((_, i) =>
    `<div class="step-dot ${i < currentPage ? 'done' : i === currentPage ? 'active' : ''}"></div>`
  ).join('');
}

function renderPage() {
  const container = document.getElementById('comicPage');
  container.innerHTML = pages[currentPage].html;
  const panels = container.querySelectorAll('.panel');
  panels.forEach((p, i) => {
    setTimeout(() => p.classList.add('visible'), 100 + i * 200);
  });
  document.getElementById('pageInfo').textContent = `${currentPage + 1} / ${pages.length}`;
  document.getElementById('btnPrev').disabled = currentPage === 0;
  document.getElementById('btnNext').disabled = currentPage === pages.length - 1;
  renderDots();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goPage(dir) {
  const next = currentPage + dir;
  if (next < 0 || next >= pages.length) return;
  currentPage = next;
  renderPage();
}

renderPage();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') goPage(1);
  if (e.key === 'ArrowLeft') goPage(-1);
});
</script>
